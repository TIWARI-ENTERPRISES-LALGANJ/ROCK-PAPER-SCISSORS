<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RPS - Gaming UI</title>

<style>

/* 🌌 Background */
body {
  margin: 0;
  background: radial-gradient(circle at center, rgb(15,0,40), rgb(5,0,20));
  color: white;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

/* 🎮 Heading */
h1 {
  margin-top: 20px;
  font-size: 32px;
  letter-spacing: 2px;
  color: rgb(0,200,255);
  text-shadow: 0 0 15px rgba(0,200,255,0.8);
}

/* ✨ Subheading */
h5 {
  color: rgb(180,180,180);
  font-size: 18px;
}

/* 🎴 Button Cards */
.button-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.imageAsAbutton {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  height: 200px;
  width: 150px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.imageAsAbutton:hover {
  transform: translateY(-10px) scale(1.08);
  box-shadow: 0 0 25px rgba(0,200,255,0.6);
}

/* 🖼️ Images */
.imageAsAbutton img {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0px 0px 12px rgba(0,200,255,0.8));
}

/* ⚔️ Moves Display */
.moves {
  margin-top: 30px;
  font-size: 20px;
}

#playerMove {
  color: rgb(0,200,255);
  text-shadow: 0 0 10px rgba(0,200,255,0.8);
  font-weight: bold;
}

#computerMove {
  color: rgb(255,80,120);
  text-shadow: 0 0 10px rgba(255,80,120,0.8);
  font-weight: bold;
}

/* 🏆 Result */
#result {
  font-size: 30px;
  margin-top: 20px;
  transition: all 0.3s ease;
}

/* 📊 Scoreboard */
.scoreboard {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 20px;
  font-size: 18px;
}

/* 🔘 Reset Button */
.reset-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.reset-btn:hover {
  background: rgba(0,200,255,0.3);
}

</style>
</head>

<body>

<h1>🎮 ROCK PAPER SCISSORS</h1>
<h5>Select your move</h5>

<div class="button-container">
  <button class="imageAsAbutton" onclick="playGame('rock')">
    <img src="images/rock.png">
  </button>

  <button class="imageAsAbutton" onclick="playGame('paper')">
    <img src="images/paper.png">
  </button>

  <button class="imageAsAbutton" onclick="playGame('scissors')">
    <img src="images/scissors.png">
  </button>
</div>

<!-- ⚔️ Moves -->
<div class="moves">
  <span id="playerMove"></span>
  <span style="margin:0 10px;">VS</span>
  <span id="computerMove"></span>
</div>

<!-- 🏆 Result -->
<p id="result"></p>

<!-- 📊 Score -->
<div class="scoreboard">
  <div>🏆 Wins: <span id="ScoreWins"></span></div>
  <div>❌ Losses: <span id="ScoreLosses"></span></div>
  <div>🤝 Ties: <span id="ScoreTies"></span></div>
</div>

<button class="reset-btn" onclick="resetScore()">Reset Score</button>

<script>

/* 📊 Score System */
let score = JSON.parse(localStorage.getItem('score')) || {
  wins: 0,
  losses: 0,
  ties: 0
};

/* 🔄 Load Score on Start */
updateScore();

/* 🎮 Game Logic */
function playGame(playerMove) {

  const computerMove = getComputerMove();
  let result = '';

  if (playerMove === computerMove) {
    result = 'TIE';
  } else if (
    (playerMove === 'rock' && computerMove === 'scissors') ||
    (playerMove === 'paper' && computerMove === 'rock') ||
    (playerMove === 'scissors' && computerMove === 'paper')
  ) {
    result = 'YOU WON';
  } else {
    result = 'YOU LOSE';
  }

  /* 📊 Update Score */
  if (result === 'YOU WON') score.wins++;
  else if (result === 'YOU LOSE') score.losses++;
  else score.ties++;

  localStorage.setItem('score', JSON.stringify(score));

  /* 🖥️ Update UI */
  document.getElementById("playerMove").innerText = playerMove.toUpperCase();
  document.getElementById("computerMove").innerText = computerMove.toUpperCase();

  let resultElement = document.getElementById("result");
  resultElement.innerText = result;

  /* 🎨 Result Color */
  if (result === 'YOU WON') resultElement.style.color = "rgb(0,255,100)";
  else if (result === 'YOU LOSE') resultElement.style.color = "rgb(255,60,60)";
  else resultElement.style.color = "rgb(255,200,0)";

  /* ⚡ Animation */
  resultElement.style.transform = "scale(1.3)";
  setTimeout(() => {
    resultElement.style.transform = "scale(1)";
  }, 200);

  updateScore();
}

/* 🤖 Computer Move */
function getComputerMove() {
  const moves = ['rock', 'paper', 'scissors'];
  return moves[Math.floor(Math.random() * 3)];
}

/* 📊 Update Score UI */
function updateScore() {
  document.getElementById("ScoreWins").innerText = score.wins;
  document.getElementById("ScoreLosses").innerText = score.losses;
  document.getElementById("ScoreTies").innerText = score.ties;
}

/* 🔄 Reset */
function resetScore() {
  score = { wins: 0, losses: 0, ties: 0 };
  localStorage.removeItem('score');
  updateScore();
  alert("Score Reset!");
}

</script>

</body>
</html>
